name: Nightly AD Digest

on:
  schedule:
    # 07:00 UTC = 02:00 EST / 03:00 EDT. Either is "middle of the night".
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      lookback_hours:
        description: "How many hours back to include (default 24; widen for a test)"
        required: false
        default: "24"

permissions:
  contents: read

jobs:
  build-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build digest (RSS -> text)
        env:
          LOOKBACK_HOURS: ${{ github.event.inputs.lookback_hours || '24' }}
        run: python main.py

      - name: Update the Google Doc for NotebookLM
        env:
          GOOGLE_OAUTH_TOKEN_BASE64: ${{ secrets.GOOGLE_OAUTH_TOKEN_BASE64 }}
          GOOGLE_DOC_ID: ${{ secrets.GOOGLE_DOC_ID }}
          LOOKBACK_HOURS: ${{ github.event.inputs.lookback_hours || '24' }}
        run: python update_gdoc.py
