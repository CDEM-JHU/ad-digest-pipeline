name: Nightly AD Digest

on:
  schedule:
    # 07:00 UTC = 02:00 EST. GitHub cron is always UTC and has no DST,
    # so during EDT (summer) this fires at 03:00 local. Adjust if needed.
    - cron: "0 7 * * *"
  workflow_dispatch: {}  # allow manual runs from the Actions tab

permissions:
  contents: read

jobs:
  build-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Decode service-account credentials
        env:
          GOOGLE_CREDENTIALS_BASE64: ${{ secrets.GOOGLE_CREDENTIALS_BASE64 }}
        run: |
          if [ -z "$GOOGLE_CREDENTIALS_BASE64" ]; then
            echo "::error::GOOGLE_CREDENTIALS_BASE64 secret is empty or unset."
            exit 1
          fi
          printf '%s' "$GOOGLE_CREDENTIALS_BASE64" | base64 --decode > credentials.json
          # sanity-check it decoded to valid JSON without printing its contents
          python -c "import json; json.load(open('credentials.json')); print('credentials.json decoded OK')"

      - name: Run digest
        env:
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
        run: python main.py

      - name: Clean up credentials
        if: always()
        run: rm -f credentials.json
